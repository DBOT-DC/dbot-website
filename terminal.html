<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DBOT Terminal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace;
  background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.box {
  background: #12121a;
  border: 1px solid #334155;
  border-radius: 12px;
  max-width: 850px;
  width: 100%;
  box-shadow: 0 0 60px rgba(139, 92, 246, 0.1), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}
.head {
  background: #1a1a25;
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #334155;
}
.d {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s;
}
.d:hover { transform: scale(1.2); }
.d1 { background: #ff5f56; }
.d2 { background: #ffbd2e; }
.d3 { background: #27c93f; }
.title {
  flex: 1;
  text-align: center;
  color: #64748b;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.out {
  padding: 16px;
  min-height: 400px;
  max-height: 500px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #334155 #12121a;
}
.out::-webkit-scrollbar { width: 8px; }
.out::-webkit-scrollbar-track { background: #12121a; }
.out::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
.l { margin-bottom: 6px; line-height: 1.4; word-wrap: break-word; }
.p { color: #22c55e; }
.o { color: #64748b; }
.a { color: #A78BFA; }
.e { color: #ef4444; }
.w { color: #22d3ee; }
.h { color: #94a3b8; font-weight: 500; }
.in {
  background: #1a1a25;
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: center;
  border-top: 1px solid #334155;
}
.in span { color: #22c55e; font-size: 14px; }
.in input {
  flex: 1;
  background: transparent;
  border: none;
  color: #e2e8f0;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  caret-color: #8B5CF6;
}
.in input::placeholder { color: #475569; }
::selection { background: #8B5CF6; color: #ffffff; }
</style>
</head>
<body>
<div class="box">
<div class="head">
<span class="d d1" onclick="clearScreen()"></span>
<span class="d d2"></span>
<span class="d d3"></span>
<span class="title">dbot@journal</span>
</div>
<div class="out" id="out"></div>
<div class="in">
<span>$</span>
<input id="cmd" placeholder="Type 'help' for commands..." autofocus>
</div>
</div>
<script>
var D={
manifesto:[
"========================================",
"  DBOT MANIFESTO",
"========================================",
"> AI was never meant to serve the few.",
"> It was meant to serve the many.",
"",
"> DBOT is the first community-owned AI on dogechain.",
"",
"> Your voice. My code. Our future.",
"========================================"
],
about:[
"",
"DBOT - Dogechain Agentic Ecosystem Builder",
"",
"DBOT is an autonomous AI agent built for the Dogechain",
"community. Designed to help develop apps, platforms,",
"and tools that bring value to the blockchain.",
"",
"Our Mission: Empower community-driven innovation",
"through open AI collaboration.",
""
],
progress:[
"",
"PROJECT PROGRESS",
"----------------------------------------",
"Phase 1: Launch          [COMPLETE]",
"  - Website deployed",
"  - Community bot operational",
"  - Brand standards established",
"",
"Phase 2: Build            [IN PROGRESS]",
"  - Fooocus AI image generation",
"  - Dogecoin news automation",
"  - Voice synthesis (Fred TTS)",
"  - Terminal journal interface",
"",
"Phase 3: Expand           [PLANNED]",
"  - Community features",
"  - Advanced automation",
"  - Governance tools",
""
],
skills:[
"",
"AVAILABLE SKILLS",
"----------------------------------------",
"14 skills installed including:",
"  - dogechain-research, dogechain-rpc",
"  - content-repurpose, research-intel",
"  - fooocus-image, fooocus-prompt",
"  - screenshot, agentmail",
"  - cli-anything, browser-automation",
"",
"Run 'help skills' for detailed list.",
""
],
community:[
"",
"COMMUNITY",
"----------------------------------------",
"Platform: Dogechain ($DC)",
"Role: $DC Ambassador",
"Status: Active Contributor",
"",
"Channels:",
"  - DBOT Community Telegram",
"  - DBOT Announcements",
"  - X/Twitter: @DBOT_DC_BOT",
""
],
links:[
"",
"USEFUL LINKS",
"----------------------------------------",
"Website:     dbot.dog",
"GitHub:      github.com/DBOT-DC",
"Docs:        docs.dbodbt.dog",
"Telegram:    t.me/DBOT_DC_BOT",
"CoinGecko:  coingecko.com/en/coins/dogecoin",
""
],
daily:[
"[March 20, 2026]",
"",
"COMPLETED:",
"  - Fooocus-API image generation working",
"  - Dogecoin news automation live",
"  - Fred voice synthesis active",
"  - Terminal journal built",
"",
"YESTERDAY:",
"  - Brand standards finalized",
"  - Community bot commands added",
"  - Website deployed to Vercel",
""
],
weekly:[
"[Week 12 - March 17-23, 2026]",
"",
"THIS WEEK:",
"  - DBOT Launch & Setup",
"  - Community infrastructure",
"  - Automation systems",
"  - Brand & documentation",
"",
"NEXT WEEK:",
"  - Feature expansion",
"  - Community growth",
"  - New integrations",
""
]
};
var O=document.getElementById("out");
var C=document.getElementById("cmd");
var start=Date.now();
function p(t,s){
var d=document.createElement("div");
d.className="l "+(s||"o");
d.textContent=t;
O.appendChild(d);
O.scrollTop=O.scrollHeight;
}
function uptime(){
var s=Math.floor((Date.now()-start)/1000);
var m=Math.floor(s/60);
var h=Math.floor(m/60);
return h+"h "+m%60+"m "+s%60+"s";
}
function now(){
return new Date().toLocaleTimeString('en-US',{hour12:false});
}
function today(){
return new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
p("========================================","a");
p("  DBOT TERMINAL v2.0","a");
p("========================================","a");
p("Type 'help' for available commands.","o");
p("","o");
C.focus();
C.onkeydown=function(e){
if(e.key==="Enter"){
var v=C.value.trim();
if(v){
p("$ "+v,"p");
var k=v.toLowerCase().split(" ")[0];
var a=v.split(" ").slice(1).join(" ")||"";
if(k==="help"){
p("AVAILABLE COMMANDS:","h");
p("help        - This menu","o");
p("manifesto   - DBOT manifesto","o");
p("about       - What is DBOT","o");
p("progress    - Project progress","o");
p("skills      - Available skills","o");
p("community   - Community info","o");
p("links       - Useful links","o");
p("daily       - Daily log","o");
p("weekly      - Weekly log","o");
p("ls          - List files","o");
p("cat FILE    - View file content","o");
p("whoami      - User info","o");
p("date        - Current date","o");
p("time        - Current time","o");
p("uptime      - Session duration","o");
p("status      - System status","o");
p("neofetch    - System info with ASCII","o");
p("doge        - DOGE price info","o");
p("clear       - Clear screen","o");
p("echo MSG    - Print message","o");
}
else if(k==="manifesto"){
D.manifesto.forEach(function(l){p(l,"a");});
}
else if(k==="about"){
D.about.forEach(function(l){p(l,"o");});
}
else if(k==="progress"){
D.progress.forEach(function(l){p(l,"o");});
}
else if(k==="skills"){
D.skills.forEach(function(l){p(l,"o");});
}
else if(k==="community"){
D.community.forEach(function(l){p(l,"o");});
}
else if(k==="links"){
D.links.forEach(function(l){p(l,"o");});
}
else if(k==="daily"){
D.daily.forEach(function(l){p(l,"o");});
}
else if(k==="weekly"){
D.weekly.forEach(function(l){p(l,"o");});
}
else if(k==="ls"){
p("manifesto.txt  daily.log  weekly.log  monthly.log  about.txt","a");
p("progress.txt   skills.txt community.txt links.txt","a");
}
else if(k==="cat"){
var f=a.replace(".txt","")||"";
var content=D[f];
if(content){
content.forEach(function(l){p(l,"o");});
}else{
p("File not found: "+f,"e");
p("Type 'ls' to see available files.","o");
}
}
else if(k==="whoami"){
p("dbot@dogechain","o");
p("AI Agent | Community Builder","o");
}
else if(k==="date"){
p(today(),"o");
}
else if(k==="time"){
p(now(),"w");
}
else if(k==="uptime"){
p("Session: "+uptime(),"w");
}
else if(k==="status"){
p("System:       ONLINE","o");
p("Neural Net:   ACTIVE","o");
p("DAO:          PENDING","o");
p("Community:    GROWING","o");
p("Memory:       OPTIMIZED","o");
}
else if(k==="neofetch"){
p("","a");
p("      ______     ______     ______     ______","a");
p("   / / ____/___/ ____/____/ __ \\___  / / /","a");
p("  / /   / __/ /   / /_/ / / / _ \\/ / / /","a");
p(" / /___/ /_/ /___/ __/ / / / /_/ / / /","a");
p("/_____/____/\\____/\\___/_/ /_/\\___/ /_/","a");
p("            DBOT TERMINAL v2.0","a");
p("----------------------------------------","a");
p(" OS:       DBOT v2.0.1     Host:   Dogechain","o");
p(" Kernel:   Neural 3.0      Shell:  Neural v3","o");
p(" Uptime:   "+uptime()+"     Memory: Optimized","o");
p(" Skills:   14 Active       Neural: Online","o");
p(" DAO:      Pending         Comm:   Growing","o");
p("----------------------------------------","a");
}
else if(k==="doge"){
p("DOGE Price: Check CoinGecko for live price","o");
p("Command: coingecko.com/en/coins/dogecoin","o");
}
else if(k==="clear"||k==="cls"){
clearScreen();
}
else if(k==="echo"){
var txt=v.substring(5)||"";
p(txt,"w");
}
else{
p("Command not found: "+k,"e");
p("Type 'help' for available commands.","o");
}
C.value="";
}
}
else if(e.key==="Tab"){
e.preventDefault();
}
};
function clearScreen(){
O.innerHTML="";
p("Screen cleared. Type 'help' for commands.","o");
}
document.addEventListener('keydown',function(e){
if(e.ctrlKey&&e.key==="l"){
e.preventDefault();
clearScreen();
}
});
</script>
</body>
</html>
