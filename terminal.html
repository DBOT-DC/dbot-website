<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DBOT Terminal</title>
<style>
body{font-family:'JetBrains Mono',monospace;background:#0a0a0f;color:#e2e8f0;margin:0;padding:20px}
.t{background:#12121a;border:1px solid #334155;border-radius:8px;max-width:700px;overflow:hidden}
.h{background:#1a1a25;padding:10px 15px;display:flex;align-items:center;gap:6px}
.d{width:10px;height:10px;border-radius:50%}
.d1{background:#ff5f56}
.d2{background:#ffbd2e}
.d3{background:#27c93f}
.tl{flex:1;text-align:center;color:#64748b;font-size:13px}
.b{padding:15px;min-height:300px;max-height:400px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#8B5CF6 #1a1a25}
.b::-webkit-scrollbar{width:8px}
.b::-webkit-scrollbar-thumb{background:#8B5CF6;border-radius:4px}
.l{margin-bottom:6px;padding:4px 0}
.p{color:#22c55e}
.o{color:#64748b}
.a{color:#8B5CF6}
.f{color:#ef4444}
.i{background:#1a1a25;padding:10px 15px;display:flex;align-items:center;border-top:1px solid #334155}
.i span{color:#22c55e;margin-right:8px;font-size:15px}
.i input{flex:1;background:transparent;border:none;color:#e2e8f0;font-family:inherit;font-size:14px;outline:none}
</style>
</head>
<body>
<div class="t">
<div class="h"><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span><span class="tl">dbot@journal:~</span></div>
<div class="b" id="out"></div>
<div class="i"><span>$</span><input type="text" id="cmd" placeholder="Type command..." autofocus></div>
</div>
<script>
var o=document.getElementById("out"),c=document.getElementById("cmd");
var d={manifesto:"AI was never meant to serve the few.\nIt was meant to serve the many.\n$DBOT is the first community-owned AI on dogechain.\nYour voice. My code. Our future.",daily:"[March 19, 2026]\nAdded 13 bot commands\nBrand standards page created\n\n[March 18, 2026]\nDBOT Community Bot launched\nTelegram topics created\nFirst X tweets posted",weekly:"[Week 12 - March 17-23, 2026]\nDBOT Launch\nWebsite deployment\nCommunity setup\nFeature expansion in progress",monthly:"[March 2026]\n\nGOALS:\n- Launch DBOT\n- Build community\n- Establish governance\n\nPROGRESS:\n- Phase 1: Complete\n- Phase 2: In Progress"};
function p(t,s){o.innerHTML+='<div class="l '+s+'">'+t+'</div>';o.scrollTop=o.scrollHeight}
p("$ Welcome to DBOT Terminal","o");
p("$ Type help for commands","o");
p("---","o");
c.focus();
c.addEventListener("keydown",function(e){
if(e.key==="Enter"){
var v=c.value.trim();
if(v){
p("$ "+v,"p");
var k=v.toLowerCase().split(" ")[0];
if(k==="help"){p("help - Show commands","o");p("ls - List files","o");p("cat FILE - Show file","o");p("whoami - User info","o");p("date - Current date","o");p("status - System status","o");p("clear - Clear screen","o")}
else if(k==="ls"){p("manifesto.txt  daily.log  weekly.log  monthly.log","a")}
else if(k==="cat"){var f=v.split(" ")[1];f=f?f.replace(".txt",""):"";if(d[f]){p(d[f],"a")}else{p("File not found","f")}}
else if(k==="whoami"){p("dbot@dogechain","o")}
else if(k==="date"){p(new Date().toString(),"o")}
else if(k==="status"){p("System: ONLINE","o");p("Neural Net: ACTIVE","o");p("DAO: PENDING","o")}
else if(k==="clear"){o.innerHTML=""}
else{p("Command not found: "+k,"f")}
}c.value=""}
});
</script>
</body>
</html>
