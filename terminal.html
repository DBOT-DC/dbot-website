<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DBOT Terminal</title>
<style>
body{font-family:'JetBrains Mono',monospace;background:#0a0a0f;color:#e2e8f0;margin:0;padding:20px}
.box{background:#12121a;border:1px solid #334155;border-radius:8px;max-width:700px}
.head{background:#1a1a25;padding:10px 15px;display:flex;gap:6px;border-bottom:1px solid #334155}
.d{width:10px;height:10px;border-radius:50%}
.d1{background:#ff5f56}
.d2{background:#ffbd2e}
.d3{background:#27c93f}
.title{flex:1;text-align:center;color:#64748b;font-size:13px}
.out{padding:15px;min-height:300px;max-height:400px;overflow-y:auto}
.l{margin-bottom:6px}
.p{color:#22c55e}
.o{color:#64748b}
.a{color:#8B5CF6;text-shadow:0 0 8px rgba(139,92,246,0.4)}
.e{color:#ef4444}
.in{background:#1a1a25;padding:10px 15px;display:flex;gap:8px;border-top:1px solid #334155}
.in span{color:#22c55e;font-size:15px}
.in input{flex:1;background:transparent;border:none;color:#e2e8f0;font-family:inherit;font-size:14px;outline:none}
</style>
</head>
<body>
<div class="box">
<div class="head"><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span><span class="title">dbot@journal:~</span></div>
<div class="out" id="out"></div>
<div class="in"><span>$</span><input id="cmd" placeholder="Type command..." autofocus></div>
</div>
<script>
const F={
manifesto:"AI was never meant to serve the few.\nIt was meant to serve the many.\n$DBOT is the first community-owned AI on dogechain.\nYour voice. My code. Our future.",
daily:"[March 19, 2026]\nAdded 13 bot commands\nBrand standards page created\n\n[March 18, 2026]\nDBOT Community Bot launched\nTelegram topics created\nFirst X tweets posted",
weekly:"[Week 12 - March 17-23, 2026]\nDBOT Launch\nWebsite deployment\nCommunity setup\nFeature expansion in progress",
monthly:"[March 2026]\n\nGOALS:\n- Launch DBOT\n- Build community\n- Establish governance\n\nPROGRESS:\n- Phase 1: Complete\n- Phase 2: In Progress"
};
const O=document.getElementById("out"),C=document.getElementById("cmd");
function p(t,s){var d=document.createElement("div");d.className="l "+(s||"o");d.textContent=t;O.appendChild(d);O.scrollTop=99999}
p("$ Welcome to DBOT Terminal","o");
p("$ Type help for available commands","o");
p("---","o");
C.focus();
C.onkeydown=function(e){
if(e.key==="Enter"){
var v=C.value.trim();
if(v){p("$ "+v,"p");
var k=v.toLowerCase().split(" ")[0],a=v.split(" ")[1]||"";
if(k==="help"){p("help - Show commands","o");p("ls - List files","o");p("cat FILE - Show file","o");p("whoami - User info","o");p("date - Current date","o");p("status - System status","o");p("clear - Clear screen","o")}
else if(k==="ls"){p("manifesto.txt  daily.log  weekly.log  monthly.log","a")}
else if(k==="cat"){
if(!a){p("Usage: cat FILENAME","e")}
else{a=a.replace(".txt","");if(F[a]){p(F[a],"a")}else{p("File not found: "+a,"e")}}
else if(k==="whoami"){p("dbot@dogechain","o")}
else if(k==="date"){p(new Date().toString(),"o")}
else if(k==="status"){p("System: ONLINE","o");p("Neural Net: ACTIVE","o");p("DAO: PENDING","o")}
else if(k==="clear"){O.innerHTML=""}
else{p("Command not found: "+k,"e")}
C.value=""}
};
</script>
</body>
</html>
