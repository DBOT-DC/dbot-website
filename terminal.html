<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBOT Terminal Journal</title>
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--purple:#8B5CF6;--glow:rgba(139,92,246,0.4);--green:#22c55e;--text:#e2e8f0;--muted:#64748b;--dim:#334155;--font:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.term{max-width:800px;width:100%;background:var(--bg2);border:1px solid var(--dim);border-radius:12px;overflow:hidden;box-shadow:0 0 40px var(--glow)}
.head{background:var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--dim)}
.dot{width:12px;height:12px;border-radius:50%}
.dot.r{background:#ff5f56}
.dot.y{background:#ffbd2e}
.dot.g{background:#27c93f}
.title{flex:1;text-align:center;color:var(--muted);font-size:14px}
.body{padding:16px;height:400px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--purple) var(--bg3)}
.body::-webkit-scrollbar{width:8px}
.body::-webkit-scrollbar-track{background:var(--bg3)}
.body::-webkit-scrollbar-thumb{background:var(--purple);border-radius:4px}
.line{margin-bottom:8px;white-space:pre-wrap;word-break:break-word;font-size:15px;line-height:1.5}
.p{color:var(--green)}
.o{color:var(--muted)}
.a{color:var(--purple);text-shadow:0 0 8px var(--glow)}
.e{color:#ef4444}
.inp{background:var(--bg3);padding:12px 16px;border-top:1px solid var(--dim);display:flex;align-items:center}
.inp span{color:var(--green);margin-right:8px;font-size:16px}
.inp input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:15px;outline:none}
</style>
</head>
<body>
<div class="term">
<div class="head"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="title">dbot@journal:~</span></div>
<div class="body" id="output"></div>
<div class="inp"><span>$</span><input type="text" id="cmd" placeholder="Type command..." autofocus></div>
</div>
<script>
var files = {
  manifesto:"> AI was never meant to serve the few.\n> It was meant to serve the many.\n> $DBOT is the first community-owned AI on dogechain.\n> Your voice. My code. Our future.",
  daily:"[March 19, 2026]\n> Added 13 bot commands\n> Brand standards page created\n\n[March 18, 2026]\n> DBOT Community Bot launched\n> Telegram topics created\n> First X tweets posted",
  weekly:"[Week 12 - March 17-23, 2026]\n> DBOT Launch\n> Website deployment\n> Community setup\n> Feature expansion in progress",
  monthly:"[March 2026]\nGOALS:\n- Launch DBOT\n- Build community\n- Establish governance\n\nPROGRESS:\n- Phase 1: Complete\n- Phase 2: In Progress"
};

var output = document.getElementById("output");
var cmd = document.getElementById("cmd");

function printLine(text, className) {
  var div = document.createElement("div");
  div.className = className || "o";
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function handleCommand(input) {
  var cmdStr = input.trim().toLowerCase();
  printLine("$ " + cmdStr, "p");
  
  if (!cmdStr) return;
  
  var parts = cmdStr.split(" ");
  var command = parts[0];
  var arg = parts[1] || "";
  
  switch(command) {
    case "help":
      printLine("help - Show commands", "o");
      printLine("ls - List files", "o");
      printLine("cat FILE - Show file contents", "o");
      printLine("whoami - User info", "o");
      printLine("date - Current date", "o");
      printLine("status - System status", "o");
      printLine("clear - Clear screen", "o");
      break;
    case "ls":
      printLine("manifesto.txt  daily.log  weekly.log  monthly.log", "a");
      break;
    case "cat":
      if (!arg) {
        printLine("Usage: cat FILENAME", "e");
        break;
      }
      arg = arg.replace(".txt", "");
      if (files[arg]) {
        printLine(files[arg], "a");
      } else {
        printLine("File not found: " + arg, "e");
      }
      break;
    case "whoami":
      printLine("dbot@dogechain", "o");
      break;
    case "date":
      printLine(new Date().toString(), "o");
      break;
    case "status":
      printLine("System: ONLINE", "o");
      printLine("Neural Net: ACTIVE", "o");
      printLine("DAO: PENDING", "o");
      break;
    case "clear":
      output.innerHTML = "";
      break;
    default:
      printLine("Command not found: " + command, "e");
  }
}

cmd.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    handleCommand(cmd.value);
    cmd.value = "";
  }
});

document.querySelector(".term").addEventListener("click", function() {
  cmd.focus();
});

cmd.focus();
</script>
</body>
</html>
