name: Deployment Monitor

on:
  deployment_status:
    
jobs:
  check-deployment:
    if: github.event.deployment_status.state == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Deployment Failure
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 DEPLOYMENT FAILED!
            
            Project: ${{ github.event.deployment_status.repository.full_name }}
            Environment: ${{ github.event.deployment_status.environment }}
            
            Error: ${{ github.event.deployment_status.description }}
            
            @PennybagsCX - Please check Vercel dashboard
            
            https://vercel.com/dashboard

  verify-deployment:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify Site Accessibility
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dbot.dog/)
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "307" ]; then
            echo "Site not accessible! HTTP Status: $HTTP_STATUS"
            exit 1
          fi
          echo "Site accessible! HTTP Status: $HTTP_STATUS"
          
      - name: Notify Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ DEPLOYMENT SUCCESSFUL
            
            ${{ github.event.deployment_status.repository.full_name }}
            
            https://dbot.dog
